name: Daily scrape

on:
  schedule:
    # 07:23 UTC — horário "quebrado" de propósito: cargas em horários cheios
    # (07:00, 08:00...) entram em fila e atrasam no GitHub Actions.
    - cron: "23 7 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

# Nunca duas execuções ao mesmo tempo: a segunda espera a primeira terminar,
# evitando corrida no push do commit automático.
concurrency:
  group: daily-scrape
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install dependencies
        run: pip install -r requirements.txt

      # Os runners ubuntu-latest já trazem o Chrome instalado; o Selenium
      # Manager (selenium>=4.6) resolve o chromedriver compatível sozinho.
      - name: Scrape prices and refresh report
        run: PYTHONPATH=src python -m price_radar run

      - name: Commit updated price data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/
          if git diff --staged --quiet; then
            echo "Nenhuma mudança em data/ para commitar."
          else
            git commit -m "chore: daily price snapshot [skip ci]"
            git push
          fi
