name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      # Os testes rodam contra fixtures HTML e bancos temporários:
      # nada de rede nem navegador, então este job é rápido e estável.
      - name: Run test suite
        run: python -m pytest
